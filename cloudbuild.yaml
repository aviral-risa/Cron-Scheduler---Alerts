# Cloud Build configuration for MedOncAnalytics
# Deploys: Frontend to Firebase Hosting, API to Cloud Run

steps:
  # Step 1: Install dependencies
  - name: 'node:20'
    entrypoint: 'npm'
    args: ['ci']

  # Step 2: Build the frontend
  - name: 'node:20'
    entrypoint: 'npm'
    args: ['run', 'build']
    env:
      - 'VITE_API_BASE_URL=${_API_URL}'

  # Step 3: Deploy frontend to Firebase Hosting
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        curl -sL https://firebase.tools | bash
        firebase deploy --only hosting --project=${PROJECT_ID}

  # Step 4: Build and push API Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/${PROJECT_ID}/medonc-analytics/api:$BUILD_ID'
      - '-t'
      - 'us-central1-docker.pkg.dev/${PROJECT_ID}/medonc-analytics/api:latest'
      - '.'

  # Step 5: Push Docker image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'us-central1-docker.pkg.dev/${PROJECT_ID}/medonc-analytics/api:$BUILD_ID'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'us-central1-docker.pkg.dev/${PROJECT_ID}/medonc-analytics/api:latest'

  # Step 6: Deploy API to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    args:
      - 'gcloud'
      - 'run'
      - 'deploy'
      - 'medonc-analytics-api'
      - '--image=us-central1-docker.pkg.dev/${PROJECT_ID}/medonc-analytics/api:$BUILD_ID'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--set-env-vars=NODE_ENV=production'
      - '--clear-secrets'
      - '--memory=2Gi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=10'

substitutions:
  _API_URL: 'https://medonc-analytics-api-835676485453.us-central1.run.app'

options:
  logging: LEGACY

timeout: '1800s'
