# Deploy Cloud Cron API to Cloud Run + optional Cloud Scheduler job setup
#
# Usage:
#   gcloud builds submit --config=cloudbuild-cron.yaml --project=rapids-platform
#   ./scripts/setup-cloud-scheduler.sh

substitutions:
  _REGION: us-central1
  _ARTIFACT_REPO: account-mgmt

steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-f'
      - 'Dockerfile.cron'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/cron-api:$BUILD_ID'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/cron-api:latest'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/cron-api:$BUILD_ID'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/cron-api:latest'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'account-mgmt-cron'
      - '--image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/cron-api:$BUILD_ID'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--no-allow-unauthenticated'
      - '--memory=2Gi'
      - '--cpu=1'
      - '--timeout=900'
      - '--min-instances=0'
      - '--max-instances=3'
      - '--set-env-vars=NODE_ENV=production,SCHEDULER_CLOUD_MODE=true,SCHEDULER_STATE_BACKEND=firestore'

options:
  logging: LEGACY

timeout: '1800s'
