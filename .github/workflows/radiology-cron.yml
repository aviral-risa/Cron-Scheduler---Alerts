# Radiology Cron — Astera only (dedicated bot + service account)
#
# Secrets: RADIOLOGY_ENV_FILE (or DASHBOARD_ENV_FILE), GCP_SA_KEY
# Channels: SLACK_CHANNEL_ASTERA_RADIOLOGY_INTERNAL=C09K4FFGV7H
#           SLACK_CHANNEL_TEST_ALERTS=C0BEP0W1WAK

name: Radiology Cron (Astera)

on:
  schedule:
    - cron: '30 5 * * *'   # 11:00 AM IST — dashboard sync
    - cron: '0 10 * * *'   # 3:30 PM IST — yesterday unworked
    - cron: '30 10 * * *'  # 4:00 PM IST — denial internal
    - cron: '30 11 * * *'  # 5:00 PM IST — assigned unworked
    - cron: '45 11 * * *'  # 5:15 PM IST — query return
    - cron: '30 16 * * *'  # 10:00 PM IST — WIP stale
    - cron: '30 17 * * *'  # 11:00 PM IST — authmate pending
  workflow_dispatch:
    inputs:
      job_id:
        description: 'Astera job id (e.g. astera-denial-internal). Leave empty to use schedule mapping.'
        required: false
        type: string

concurrency:
  group: radiology-cron-${{ github.ref }}
  cancel-in-progress: false

jobs:
  dispatch:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install system dependencies (canvas)
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev

      - name: Install npm dependencies
        run: npm ci

      - name: Restore scheduler state
        uses: actions/cache@v4
        with:
          path: .scheduler-runs-radiology.json
          key: scheduler-runs-radiology-${{ github.repository }}

      - name: Configure environment
        env:
          RADIOLOGY_ENV_FILE: ${{ secrets.RADIOLOGY_ENV_FILE }}
          DASHBOARD_ENV_FILE: ${{ secrets.DASHBOARD_ENV_FILE }}
        run: |
          ENV_CONTENT="${RADIOLOGY_ENV_FILE:-$DASHBOARD_ENV_FILE}"
          if [ -z "$ENV_CONTENT" ]; then
            echo "::error::Missing RADIOLOGY_ENV_FILE or DASHBOARD_ENV_FILE secret"
            exit 1
          fi
          printf '%s' "$ENV_CONTENT" > .env

      - name: Configure GCP credentials
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          if [ -z "$GCP_SA_KEY" ]; then
            echo "::error::Missing GCP_SA_KEY"
            exit 1
          fi
          printf '%s' "$GCP_SA_KEY" > gcp-sa.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=${{ github.workspace }}/gcp-sa.json" >> "$GITHUB_ENV"

      - name: Run radiology job
        env:
          GITHUB_ACTIONS: 'true'
          SCHEDULER_STATE_BACKEND: file
          SCHEDULER_STATE_FILE: .scheduler-runs-radiology.json
          CRON_REGISTRY: radiology
          CRON_MAX_JOBS_PER_DISPATCH: 1
          NODE_ENV: production
          MANUAL_CRON_RUN: 'true'
        run: |
          JOB_ID="${{ github.event.inputs.job_id }}"
          if [ -z "$JOB_ID" ] && [ "${{ github.event_name }}" = "schedule" ]; then
            case "${{ github.event.schedule }}" in
              "30 5 * * *") JOB_ID="astera-dashboard-sync" ;;
              "0 10 * * *") JOB_ID="astera-yesterday-unworked" ;;
              "30 10 * * *") JOB_ID="astera-denial-internal" ;;
              "30 11 * * *") JOB_ID="astera-assigned-unworked" ;;
              "45 11 * * *") JOB_ID="astera-query-return" ;;
              "30 16 * * *") JOB_ID="astera-wip-stale" ;;
              "30 17 * * *") JOB_ID="astera-authmate-pending" ;;
              *) echo "::error::Unknown schedule: ${{ github.event.schedule }}"; exit 1 ;;
            esac
          fi
          if [ -n "$JOB_ID" ]; then
            echo "Running radiology job: $JOB_ID"
            npx tsx scripts/github-cron-dispatch.ts "$JOB_ID"
          else
            npx tsx scripts/github-cron-dispatch.ts
          fi
